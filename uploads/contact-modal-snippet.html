<!-- ── HTML: paste before </body> ─────────────────────────────── -->

<div id="contact-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Contact">
  <div class="modal-card">
    <button class="modal-close" id="contact-close" aria-label="Close">×</button>
    <div class="modal-label">Contact</div>
    <p class="modal-body">For questions about Tactician or the waitlist, reach out directly.</p>
    <a href="mailto:hello@tactician.run" class="modal-email">hello@tactician.run</a>
  </div>
</div>

<!-- ── JS: paste before </body>, after HTML block ─────────────── -->

<script>
  const openBtn  = document.getElementById('contact-link');
  const closeBtn = document.getElementById('contact-close');
  const overlay  = document.getElementById('contact-modal');

  openBtn.addEventListener('click', function(e) { e.preventDefault(); overlay.classList.add('is-open'); overlay.setAttribute('aria-hidden', 'false'); });
  closeBtn.addEventListener('click', function() { overlay.classList.remove('is-open'); overlay.setAttribute('aria-hidden', 'true'); });
  overlay.addEventListener('click', function(e) { if (e.target === overlay) { overlay.classList.remove('is-open'); overlay.setAttribute('aria-hidden', 'true'); } });
</script>
